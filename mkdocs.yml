site_name: ARC-SCOPE
site_description: Bridge ARC-style crop parameter retrieval outputs with SCOPE-shaped experiment inputs.
site_url: https://marcyin.github.io/ARCOPE/
repo_url: https://github.com/MarcYin/ARCOPE
repo_name: MarcYin/ARCOPE
docs_dir: docs
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tabs.link
  icon:
    logo: material/satellite-variant
  palette:
    - scheme: default
      primary: teal
      accent: amber
nav:
  - Home: index.md
  - Real Full Run: full-run-example.md
  - Core Showcase: showcase-experiment.md
  - Quick Start: quickstart.md
  - Installation: installation.md
  - Architecture: architecture.md
  - API:
      - Bridge: api/bridge.md
      - Weather: api/weather.md
      - Pipeline: api/pipeline.md
      - Optimization: api/optim.md
  - Limits and Roadmap: limits-and-roadmap.md
markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
